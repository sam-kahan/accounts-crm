# ---------------------------------------------------------------------------
# Greenco Accounts CRM — production stack for a Hetzner VPS.
#
#   - db:    PostgreSQL 16 with a persistent volume
#   - app:   Node server (API + built React client) on :4000
#   - caddy: reverse proxy terminating TLS for accounts.greenco.co.uk
#            (Caddy fetches + renews Let's Encrypt certs automatically)
#
# Setup on the server:
#   1. Point the DNS A record accounts.greenco.co.uk -> the Hetzner box IP.
#   2. Copy .env.production alongside this file (see .env.production.example).
#   3. docker compose up -d --build
# ---------------------------------------------------------------------------
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-accounts}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-accounts_crm}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-accounts}']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 4000
      DATABASE_URL: postgres://${POSTGRES_USER:-accounts}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-accounts_crm}
      CORS_ORIGIN: https://accounts.greenco.co.uk
      COMPANIES_HOUSE_API_KEY: ${COMPANIES_HOUSE_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-mail.smtp2go.com}
      SMTP_PORT: ${SMTP_PORT:-2525}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      REMINDER_FROM: ${REMINDER_FROM:-Greenco Accounts <accounts@greenco.co.uk>}
      REMINDER_TO: ${REMINDER_TO:-sam.kahan@greenco.co.uk}
    expose:
      - '4000'

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  db_data:
  caddy_data:
  caddy_config:
