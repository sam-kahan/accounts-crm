name: CI

# Runs the unit tests and a client build on every push to main (and on any
# PR, should one ever be opened). Note: deploys happen via git auto-pull on
# the server the moment you push to main, so this runs *alongside* the deploy
# as a safety signal — it does not gate it. Run `npm test` locally before
# pushing to catch breakage first (see CLAUDE.md).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Unit tests
        run: npm test
      - name: Build client
        run: npm run build -w client
