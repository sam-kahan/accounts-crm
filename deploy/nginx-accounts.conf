# Nginx reverse-proxy for the Greenco Accounts CRM at accounts.greenco.co.uk.
# The Node service (accounts-crm.service) listens on 127.0.0.1:4000 and serves
# both the API (/api/*) and the built React client.
#
# Install on the server (deliver via git, do NOT paste):
#   git -C /var/www/accounts-crm show origin/main:deploy/nginx-accounts.conf \
#     | sudo tee /etc/nginx/sites-available/accounts-crm >/dev/null
#   sudo ln -sf /etc/nginx/sites-available/accounts-crm /etc/nginx/sites-enabled/accounts-crm
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d accounts.greenco.co.uk      # provisions TLS + adds the 443 block

server {
    listen 80;
    listen [::]:80;
    server_name accounts.greenco.co.uk;

    # Everything (client + API) is served by the Node app.
    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    client_max_body_size 16M;
}
